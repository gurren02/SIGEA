services:
  sigea:
    build: .
    container_name: sigea
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: mysql
      DB_NAME: sigea
      DB_USER: sigea_user
      DB_PASS: sigea_pass
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: sigea_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: sigea
      MYSQL_USER: sigea_user
      MYSQL_PASSWORD: sigea_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - sigea_mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql

volumes:
  sigea_mysql_data:
